name: Inspect Server Provider

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect remote Codex config
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -eu

            echo "== whoami/hostname =="
            whoami
            hostname

            echo "== codex config candidates =="
            for path in \
              /home/ubuntu/.codex/config.toml \
              /root/.codex/config.toml \
              /home/ubuntu/.config/codex/config.toml \
              /root/.config/codex/config.toml
            do
              if [ -f "$path" ]; then
                echo "-- FOUND: $path"
                grep -nE '^(model_provider =|model =|model_reasoning_effort =|disable_response_storage =|approvals_reviewer =|\[model_providers(\.[^]]+)?\]|name =|base_url =|wire_api =|requires_openai_auth =)' "$path" || true
              else
                echo "-- MISSING: $path"
              fi
            done

            echo "== shallow search for other config.toml files =="
            find /home/ubuntu /root -maxdepth 4 -path '*/.codex/config.toml' -print 2>/dev/null || true
