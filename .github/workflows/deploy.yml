name: Build & Deploy

on:
  push:
    branches: [main, master]

env:
  IMAGE_NAME: nano-banana-demo
  CONTAINER_NAME: nano-banana

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VITE_API_BASE=${{ secrets.VITE_API_BASE }} \
            --build-arg VITE_API_KEY=${{ secrets.VITE_API_KEY }} \
            -t ${{ env.IMAGE_NAME }}:latest .

      - name: Extract static dist from image
        run: |
          rm -rf release-dist
          mkdir -p release-dist
          docker create --name ${{ env.IMAGE_NAME }}-extract ${{ env.IMAGE_NAME }}:latest
          docker cp ${{ env.IMAGE_NAME }}-extract:/usr/share/nginx/html/. ./release-dist
          docker rm ${{ env.IMAGE_NAME }}-extract

      - name: Save image as tar
        run: docker save ${{ env.IMAGE_NAME }}:latest | gzip > image.tar.gz

      - name: Copy image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: image.tar.gz
          target: /tmp/

      - name: Copy static dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: release-dist
          target: /tmp/

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            docker load < /tmp/image.tar.gz
            docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            docker rm ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p 8080:80 \
              ${{ env.IMAGE_NAME }}:latest
            printf '%s\n' '${{ secrets.SERVER_PASSWORD }}' | sudo -S mkdir -p /var/www/image2anything/dist
            printf '%s\n' '${{ secrets.SERVER_PASSWORD }}' | sudo -S rsync -a --delete /tmp/release-dist/ /var/www/image2anything/dist/
            rm -rf /tmp/release-dist
            rm /tmp/image.tar.gz
